    <section class="page-header">
        <div class="container">
            <h1>技术支持</h1>
            <p>专业技术团队，为您提供高效解决方案</p>
        </div>
    </section>

    <section style="padding: 60px 0;">
        <div class="container">
            <div style="max-width: 800px; margin: 0 auto;">
                <h2 style="font-size: 28px; color: #E60012; margin-bottom: 30px; text-align: center;">提交技术需求</h2>
                <form action="https://formspree.io/f/xpznlqgy" method="POST" style="background-color: #f8f9fa; padding: 30px; border-radius: 8px;">
                    <input type="hidden" name="_to" value="victorlee@dimantech.com.cn">
                    <input type="hidden" name="_subject" value="【迪曼微电子】技术支持需求">
                    <input type="text" name="_gotcha" style="display:none;">

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">联系人 *</label>
                        <input type="text" name="name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">联系电话 *</label>
                        <input type="tel" name="phone" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">邮箱</label>
                        <input type="email" name="email" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">技术需求描述 *</label>
                        <textarea name="demand" rows="5" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; resize: none;"></textarea>
                    </div>
                    <button type="submit" style="width: 100%; padding: 12px; background-color: #E60012; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">提交需求</button>
                </form>
            </div>
        </div>
    </section>

            <div class="footer-content">

                </div>
